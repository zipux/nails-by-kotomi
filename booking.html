<!DOCTYPE html>
<html lang="en">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

      <a href="mailto:koto@gmail.com" class="sidebar-social">koto@gmail.com</a>
    </div>
  </aside>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <a href="index.html" class="mobile-brand">Kotomi</a>
    <button class="hamburger-btn" id="hamburgerBtn"

      <a href="booking.html" class="overlay-link" data-page="booking">Booking</a>
    </nav>
    <div class="overlay-footer">
      <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="overlay-social">Instagram</a>
      <a href="mailto:koto@gmail.com" class="overlay-social">koto@gmail.com</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-wrapper">
    <main>
      <section class="section">
        <div class="page-content">

          <h1 class="section-heading">Book an Appointment</h1>
          <p class="booking-intro">Choose a time that works for you. All appointments are confirmed instantly.</p>

          <!-- Replace "kotomi" in the Cal.com embed URL below with your actual Cal.com username -->
          <div id="cal-booking"></div>

          <p class="booking-address">Studio location: 1111 - 6767 Canada Way, Vancouver</p>

        </div>
      </section>
    </main>
  </div><!-- /.main-wrapper -->

  <script src="js/main.js"></script>

  <!-- Replace "kotomi" in the Cal.com embed URL below with your actual Cal.com username -->
  <script>
    (function (C, A, L) {

          d.head.appendChild(d.createElement('script')).src = A;
          cal.loaded = true;
        }
        if (ar[0] === L) {
          var api = function () { p(api, arguments); };
          var namespace = ar[1];

      layout: 'month_view'
